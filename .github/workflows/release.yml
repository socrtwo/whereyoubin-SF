name: Release

# Two product lines share this workflow:
#
#   • Web bundle (the PHP backend): zipped on every run. When installed on
#     a host, install.php asks the operator for their web address.
#
#   • Desktop & mobile wrappers (Pake / Bubblewrap / PWABuilder iOS): wrap
#     the STANDALONE client-side app at app/standalone/. No hosted URL is
#     needed for the end user — the app runs on-device with IndexedDB
#     persistence and every map baked in.
#
# The standalone build is published to GitHub Pages by the `pages` job;
# the wrapper jobs load it from there on first run, then cache it via a
# service worker so subsequent launches work offline.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (used when run manually)'
        required: false
        default: 'nightly'

permissions:
  contents: write
  pages:    write
  id-token: write

env:
  APP_NAME:    "Travel Log"
  STANDALONE_URL: ${{ vars.STANDALONE_URL || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
  RELEASE_TAG: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}

jobs:
# ----------------------------------------------------------------------------
  web:
    name: Web bundle (.zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP for lint sanity check
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, mbstring, json, gd

      - name: Lint every PHP file
        run: |
          set -e
          while IFS= read -r f; do php -l "$f" > /dev/null; done \
            < <(find . -name "*.php" -not -path "./TCPDF/*")

      - name: Pack the web distribution
        run: |
          set -e
          mkdir -p dist bundle
          cp -r app css fonts images maps scripts docs bundle/
          cp config.example.php composer.json bundle/
          cp footer.php header.php include.php install.php index.php bundle/
          cp j_countries_count.php j_countries_load.php j_poster.php j_save.php bundle/
          cp LICENSE README.md bundle/
          rm -f bundle/app/data/travellog.sqlite
          rm -rf bundle/app/public/uploads/*

          # Big "install first" banner for the web archive.
          cat > bundle/INSTALL.md <<'MD'
          # Travel Log — Web install

          This zip contains the PHP backend. Upload it to any PHP 8.2+ host
          (Apache, Nginx, or the built-in server) and open

              https://<your-domain>/install.php

          in a browser. The installer asks for your **web address**, MySQL
          credentials (optional — SQLite is the default), and a language,
          then seeds the database and redirects you to the app.

          The desktop and mobile versions in this release run entirely
          on-device and do NOT need this web bundle.
          MD

          BUNDLE="travellog-web-${{ env.RELEASE_TAG }}.zip"
          (cd bundle && zip -r "../dist/$BUNDLE" .)
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-web
          path: dist/*

# ----------------------------------------------------------------------------
  pages:
    name: Publish standalone to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate maps-data.js from Maps.php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, json
      - run: |
          php -r 'require "app/src/Maps.php";
                  $out = "// Auto-generated from app/src/Maps.php.\nexport const MAPS = " . json_encode(TravelLog\Maps::all(), JSON_UNESCAPED_UNICODE | JSON_PRETTY_PRINT) . ";\n";
                  file_put_contents("app/standalone/maps-data.js", $out);'

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/standalone
      - id: deploy
        uses: actions/deploy-pages@v4

# ----------------------------------------------------------------------------
  linux:
    name: Desktop — Linux (.AppImage + .deb)
    runs-on: ubuntu-latest
    needs: [pages]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Build with Pake
        run: |
          npm install -g pake-cli
          pake "${{ env.STANDALONE_URL }}" \
            --name "${{ env.APP_NAME }}" \
            --icon "$PWD/app/public/icons/icon-512.png" \
            --width 1200 --height 800
          mkdir -p dist
          mv *.deb *.AppImage *.rpm dist/ 2>/dev/null || true
          ls -lh dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-linux
          path: dist/*
          if-no-files-found: warn

# ----------------------------------------------------------------------------
  macos:
    name: Desktop — macOS (.dmg)
    runs-on: macos-latest
    needs: [pages]
    continue-on-error: true
    strategy:
      matrix:
        arch: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build with Pake
        run: |
          npm install -g pake-cli
          pake "${{ env.STANDALONE_URL }}" \
            --name "${{ env.APP_NAME }}" \
            --icon "$PWD/app/public/icons/icon-512.png" \
            --targets "${{ matrix.arch }}" \
            --width 1200 --height 800
          mkdir -p dist
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "dist/${f%.dmg}-${{ matrix.arch }}.dmg"
          done
          ls -lh dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: warn

# ----------------------------------------------------------------------------
  windows:
    name: Desktop — Windows (.msi)
    runs-on: windows-latest
    needs: [pages]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build with Pake
        shell: bash
        run: |
          npm install -g pake-cli
          pake "${{ env.STANDALONE_URL }}" \
            --name "${{ env.APP_NAME }}" \
            --icon "$PWD/app/public/icons/icon-512.png" \
            --width 1200 --height 800
          mkdir -p dist
          mv *.msi dist/ 2>/dev/null || mv *.exe dist/ 2>/dev/null || true
          ls -lh dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-windows
          path: dist/*
          if-no-files-found: warn

# ----------------------------------------------------------------------------
  android:
    name: Mobile — Android (.apk)
    runs-on: ubuntu-latest
    needs: [pages]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: android-actions/setup-android@v3

      - name: Initialise signing keystore
        run: |
          mkdir -p twa
          keytool -genkey -noprompt -v \
            -keystore twa/android.keystore \
            -storepass travellog -keypass travellog -alias travellog \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Travel Log, OU=Dev, O=Travel Log, L=Web, S=Web, C=US"

      - name: Build a Trusted Web Activity with Bubblewrap
        working-directory: twa
        env:
          BUBBLEWRAP_ACCEPT_LICENCES: "yes"
        run: |
          set -e
          npm install -g @bubblewrap/cli

          # Non-interactive init
          cat > init.json <<JSON
          {
            "host":          "${{ env.STANDALONE_URL }}",
            "name":          "${{ env.APP_NAME }}",
            "packageId":     "app.travellog.twa",
            "startUrl":      "/",
            "display":       "standalone",
            "themeColor":    "#0ea5e9",
            "backgroundColor":"#0b1220",
            "signingKeyPath":"./android.keystore",
            "signingKeyAlias":"travellog"
          }
          JSON

          bubblewrap init \
            --manifest="${{ env.STANDALONE_URL }}manifest.webmanifest" \
            --directory=. \
            --skipPwaValidation || true

          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias=travellog \
            --skipSigning=false || true

          mkdir -p ../dist
          find . -maxdepth 3 -name "*.apk" -exec cp {} ../dist/ \; 2>/dev/null || true
          find . -maxdepth 3 -name "*.aab" -exec cp {} ../dist/ \; 2>/dev/null || true
          ls -lh ../dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-android
          path: dist/*
          if-no-files-found: warn

# ----------------------------------------------------------------------------
  ios:
    name: Mobile — iOS (Xcode project .zip)
    runs-on: macos-latest
    needs: [pages]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Generate an unsigned Xcode project via PWABuilder
        run: |
          set -e
          mkdir -p ios dist
          cd ios
          # Use PWABuilder's iOS template. It generates a Swift/Xcode project
          # that wraps the PWA. Final signing + IPA production still require
          # an Apple Developer account and are done in Xcode locally.
          git clone --depth 1 https://github.com/pwa-builder/pwabuilder-ios.git template
          cd template/Microsoft.PWABuilder.IOS.Web/Resources
          # Minimal configuration: point at APP_URL and use app name + icons.
          cat > config.json <<JSON
          {
            "name":     "${{ env.APP_NAME }}",
            "host":     "${{ env.STANDALONE_URL }}",
            "manifest": "${{ env.STANDALONE_URL }}manifest.webmanifest",
            "bundleId": "app.travellog.ios",
            "themeColor": "#0ea5e9"
          }
          JSON
          cd ../../..
          zip -r ../dist/travellog-ios-xcode-${{ env.RELEASE_TAG }}.zip template
          ls -lh ../dist/

      - uses: actions/upload-artifact@v4
        with:
          name: travellog-ios
          path: dist/*
          if-no-files-found: warn

# ----------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [web, pages, linux, macos, windows, android, ios]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag != 'nightly') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts for the release
        run: |
          set -e
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.msi' \
              -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
              -o -name '*.apk' -o -name '*.aab' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Travel Log ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
          body: |
            ## Travel Log ${{ env.RELEASE_TAG }}

            Two product lines:

            - **Web** (`travellog-web-*.zip`) — the PHP backend. Unzip it on
              any PHP 8.2+ host, open `install.php`, and enter your **web
              address**. Great for multi-device sync (account = data
              follows you everywhere).

            - **Desktop & mobile wrappers** — run entirely on-device with
              all 14 regional maps built in. No account, no web address
              needed; your data lives in IndexedDB. First launch pulls
              the app from `${{ env.STANDALONE_URL }}` and caches it via
              service worker; every launch after that is offline-capable.

            | Platform    | Artifact                                                 |
            | ----------- | -------------------------------------------------------- |
            | **Web**     | `travellog-web-*.zip`                                    |
            | **Windows** | `*.msi` (install) or `*.exe` (portable)                  |
            | **macOS**   | `*-x86_64-apple-darwin.dmg` + `*-aarch64-apple-darwin.dmg` |
            | **Linux**   | `*.AppImage` (portable) + `*.deb` (Debian/Ubuntu)        |
            | **Android** | `*.apk` + `*.aab` (Play)                                 |
            | **iOS**     | `travellog-ios-xcode-*.zip` (build + sign in Xcode)      |
