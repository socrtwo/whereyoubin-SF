name: CI — Where Have I Been?

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: PHP ${{ matrix.php }} syntax check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring, gd, curl, json

      - name: Lint all PHP files
        run: |
          set -e
          errors=0
          # Exclude the bundled TCPDF vendor tree from strict linting.
          while IFS= read -r f; do
            php -l "$f" > /dev/null || errors=$((errors + 1))
          done < <(find . -name "*.php" -not -path "./TCPDF/*")
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors file(s) failed PHP $PHP_VERSION syntax check"
            exit 1
          fi
          echo "✅ All PHP files parsed cleanly under PHP ${{ matrix.php }}"

  smoke:
    name: Travel Log smoke test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring, json

      - name: Boot the app and probe the routes
        run: |
          php -S 127.0.0.1:8000 -t app/public app/public/index.php &
          SRV_PID=$!
          sleep 1
          for path in / /new /map /stats /api/trips.json /manifest.webmanifest /sw.js /styles.css /app.js /icons/icon.svg; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8000$path")
            echo "GET $path → $code"
            test "$code" = "200"
          done
          kill "$SRV_PID"
