name: Verify OIDC

# Smoke test that GitHub Actions can obtain an Azure OIDC token and impersonate
# the federated App Registration. Does NOT sign anything — safe to run any
# number of times without consuming signing quota.
#
# Before running, ensure the following repo Variables are set:
#   AZURE_CLIENT_ID
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Run from: Actions tab -> Verify OIDC -> Run workflow

on:
  workflow_dispatch: {}

permissions:
  id-token: write     # Required so GitHub can mint an OIDC token
  contents: read

jobs:
  verify:
    name: Verify Azure federation works
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm identity
        run: |
          echo "Authenticated as:"
          az account show --query '{name:name, id:id, user:user.name, tenant:tenantId}' -o table
          echo ""
          echo "Role assignments on the cert profile:"
          az role assignment list \
            --assignee "${{ vars.AZURE_CLIENT_ID }}" \
            --all \
            --query "[?contains(scope, 'certificateProfiles')].{role:roleDefinitionName, scope:scope}" \
            -o table || true
          echo ""
          echo "OIDC plumbing works. Ready to sign."
